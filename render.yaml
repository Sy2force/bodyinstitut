# Render Blueprint for Body Institut
# This file configures automatic deployment on Render

services:
  - type: web
    name: body-institut
    runtime: node
    buildCommand: npm install && npm run build
    startCommand: npm start
    env: node
    plan: starter
    autoDeploy: true
    envVars:
      - key: NODE_VERSION
        value: 20.11.0
      - key: DATABASE_URL
        fromDatabase:
          name: body-institut-db
          property: connectionString
      - key: ADMIN_USERNAME
        value: shayacoca20@gmail.com
      - key: ADMIN_PASSWORD
        value: Qwerty21
      - key: AUTH_SECRET
        generateValue: true
      - key: NEXT_PUBLIC_BOOKING_URL
        value: https://www.bodyinstitut.fr/institut-minceur-soins-corps-paris
      - key: NEXT_PUBLIC_SITE_URL
        value: https://body-institut.onrender.com
      - key: SMTP_FROM
        value: noreply@bodyinstitut.fr
      - key: NODE_ENV
        value: production
    healthCheckPath: /

  - type: postgres
    name: body-institut-db
    plan: starter
    ipAllowList:
      - source: 0.0.0.0/0
        description: everywhere
